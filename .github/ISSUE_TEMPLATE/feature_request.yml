name: ✨ 기능 제안
description: 새로운 기능이나 개선 아이디어를 제안해주세요.
title: '[Feat] '
labels: ['✨ feat']
body:
  - type: markdown
    attributes:
      value: |
        기능 제안 감사합니다! 💡
        작성 전 **이미 같은 제안이 있는지 [검색](https://github.com/hs-shell/dotbugi/issues?q=is%3Aissue)** 부탁드립니다.

  - type: checkboxes
    id: preflight
    attributes:
      label: 확인 사항
      options:
        - label: 동일하거나 유사한 제안이 없는지 검색했습니다.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나요?
      description: 이 기능이 필요하게 된 배경이나 불편한 점을 설명해주세요.
      placeholder: 과제 마감이 임박했을 때 알기 어렵습니다...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떤 기능/동작을 원하시는지 구체적으로 적어주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 생각해본 다른 방법이 있다면 적어주세요.
    validations:
      required: false
