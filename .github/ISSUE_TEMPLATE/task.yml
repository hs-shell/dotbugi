name: 🧹 작업 / 기타
description: 기능·버그가 아닌 작업(문서·CI·리팩터·빌드·잡일 등)을 등록합니다.
title: '[Task] '
body:
  - type: markdown
    attributes:
      value: |
        버그는 🐛 버그 리포트, 기능 제안은 ✨ 기능 제안 템플릿을 사용해주세요.
        작성 전 **이미 같은 작업이 있는지 [검색](https://github.com/hs-shell/dotbugi/issues?q=is%3Aissue)** 부탁드립니다.

  - type: checkboxes
    id: preflight
    attributes:
      label: 확인 사항
      options:
        - label: 동일하거나 유사한 작업이 없는지 검색했습니다.
          required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 목적
      description: 왜 이 작업이 필요한지, 현재 상태는 어떤지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: 할 일
      description: 수행할 항목을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 무엇이 충족되면 끝났다고 볼 수 있나요?
    validations:
      required: false
